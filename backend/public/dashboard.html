<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Top bar ───────────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <div class="brand__icon brand__icon--sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="5" fill="white" fill-opacity=".2"/>
          <path d="M7 12.5L10 15.5L17 8.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span>Vault</span>
    </div>
    <div class="topbar__center">
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
          <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search files…" class="search-input" />
      </div>
    </div>
    <div class="topbar__right">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar"></div>
        <span id="userName" class="user-name"></span>
      </div>
      <button id="logoutBtn" class="btn btn--ghost btn--sm">Sign out</button>
    </div>
  </header>

  <!-- ── Main ──────────────────────────────── -->
  <main class="page">

    <!-- Stats row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--blue">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-7-7z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M13 2v7h7" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <p class="stat-card__value" id="statFiles">—</p>
          <p class="stat-card__label">Total files</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--green">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="5" rx="9" ry="3" stroke="currentColor" stroke-width="1.8"/><path d="M21 12c0 1.66-4.03 3-9 3s-9-1.34-9-3" stroke="currentColor" stroke-width="1.8"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5" stroke="currentColor" stroke-width="1.8"/></svg>
        </div>
        <div>
          <p class="stat-card__value" id="statStorage">—</p>
          <p class="stat-card__label">Storage used</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon stat-card__icon--purple">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <div>
          <p class="stat-card__value" id="statRecent">—</p>
          <p class="stat-card__label">Last upload</p>
        </div>
      </div>
      <div class="stat-card stat-card--upload" id="uploadCard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 18v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Upload files
        <input type="file" id="fileInput" hidden multiple />
      </div>
    </div>

    <!-- Drop zone -->
    <div id="dropzone" class="dropzone">
      <div class="dropzone__content">
        <div class="dropzone__icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 18v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <p><strong>Drop files here</strong> or <button class="link-btn" id="browseBtn">browse</button></p>
        <p class="dropzone__hint">Any file type · Max 100 MB per file</p>
      </div>
    </div>

    <!-- Upload queue -->
    <div id="uploadQueue" class="upload-queue"></div>

    <!-- File panel -->
    <section class="panel">
      <div class="panel__head">
        <h2 id="panelTitle">All files</h2>
        <div class="panel__controls">
          <div class="view-toggle">
            <button id="viewGrid" class="view-btn is-active" title="Grid view">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/></svg>
            </button>
            <button id="viewList" class="view-btn" title="List view">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
          <button id="refreshBtn" class="icon-btn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 11A8.1 8.1 0 0 0 4.5 9M4 5v4h4M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <!-- Grid view -->
      <div id="gridView" class="file-grid"></div>

      <!-- List view -->
      <div id="listView" class="list-view" hidden>
        <table class="file-table">
          <thead>
            <tr>
              <th>Name</th><th>Type</th><th>Size</th><th>Uploaded</th><th></th>
            </tr>
          </thead>
          <tbody id="fileTableBody"></tbody>
        </table>
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" hidden>
        <div class="empty-state__icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-7-7z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M13 2v7h7" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </div>
        <p>No files yet</p>
        <span>Drop files above or click "Upload files" to get started.</span>
      </div>

      <!-- Loading state -->
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
      </div>
    </section>

  </main>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- Delete confirm modal -->
  <div id="confirmModal" class="modal">
    <div class="modal__card">
      <div class="modal__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7h12z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h3>Delete file?</h3>
      <p id="confirmModalText"></p>
      <div class="modal__actions">
        <button id="confirmCancel" class="btn btn--ghost">Cancel</button>
        <button id="confirmOk" class="btn btn--danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
