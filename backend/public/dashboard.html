<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dash-body">

  <!-- ── Topbar ────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar__left">
      <div class="brand brand--dash">
        <div class="brand__mark">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="currentColor"/>
            <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="brand__name">Vault</span>
      </div>
    </div>

    <div class="topbar__center">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
          <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search your files…" />
        <kbd>⌘K</kbd>
      </div>
    </div>

    <div class="topbar__right">
      <div class="topbar__stats">
        <span id="statFiles">0</span> files &nbsp;·&nbsp; <span id="statStorage">0 B</span>
      </div>
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar"></div>
        <span class="user-name" id="userName"></span>
      </div>
      <button id="logoutBtn" class="btn-ghost-sm">Sign out</button>
    </div>
  </header>

  <!-- ── Page body ─────────────────────────────── -->
  <main class="dash-main">

    <!-- Stat cards -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-card__glow stat-card__glow--blue"></div>
        <div class="stat-card__icon" style="--ic:#3B82F6;--ib:#1E3A5F">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-7-7z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M13 2v7h7" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
        </div>
        <div class="stat-card__body">
          <p class="stat-card__val" id="statFilesCard">—</p>
          <p class="stat-card__lbl">Total files</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-card__glow stat-card__glow--green"></div>
        <div class="stat-card__icon" style="--ic:#10B981;--ib:#0F3328">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="5" rx="9" ry="3" stroke="currentColor" stroke-width="1.7"/><path d="M21 12c0 1.66-4.03 3-9 3s-9-1.34-9-3" stroke="currentColor" stroke-width="1.7"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5" stroke="currentColor" stroke-width="1.7"/></svg>
        </div>
        <div class="stat-card__body">
          <p class="stat-card__val" id="statStorageCard">—</p>
          <p class="stat-card__lbl">Storage used</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-card__glow stat-card__glow--purple"></div>
        <div class="stat-card__icon" style="--ic:#8B5CF6;--ib:#2D1B69">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="stat-card__body">
          <p class="stat-card__val" id="statRecent">—</p>
          <p class="stat-card__lbl">Last upload</p>
        </div>
      </div>

      <!-- Upload button card -->
      <div class="stat-card stat-card--upload" id="uploadCard">
        <div class="stat-card__upload-inner">
          <div class="upload-pulse">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 18v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <span>Upload files</span>
        </div>
        <input type="file" id="fileInput" hidden multiple />
      </div>
    </div>

    <!-- Drop zone (hidden until triggered) -->
    <div id="dropzone" class="dropzone">
      <div class="dropzone__ring"></div>
      <div class="dropzone__content">
        <div class="dropzone__icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 18v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="dropzone__title">Drop files anywhere</p>
        <p class="dropzone__hint">or <button class="link-btn" id="browseBtn">browse your device</button> · Max 100 MB</p>
      </div>
    </div>

    <!-- Upload progress queue -->
    <div id="uploadQueue" class="upload-queue"></div>

    <!-- File panel -->
    <section class="file-panel">
      <div class="file-panel__head">
        <h2 id="panelTitle">All files</h2>
        <div class="file-panel__controls">
          <div class="view-toggle">
            <button id="viewGrid" class="view-btn is-active" title="Grid">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg>
            </button>
            <button id="viewList" class="view-btn" title="List">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
          <button id="refreshBtn" class="icon-btn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 11A8.1 8.1 0 0 0 4.5 9M4 5v4h4M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <!-- Grid view -->
      <div id="gridView" class="file-grid"></div>

      <!-- List view -->
      <div id="listView" class="list-view" hidden>
        <table class="file-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Size</th>
              <th>Uploaded</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="fileTableBody"></tbody>
        </table>
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" hidden>
        <div class="empty-state__visual">
          <div class="empty-orb"></div>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-7-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M13 2v7h7" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 13h6M9 17h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h3>Vault is empty</h3>
        <p>Upload your first file to get started.</p>
      </div>

      <!-- Loading state -->
      <div id="loadingState" class="loading-state">
        <div class="loader">
          <div class="loader__ring"></div>
          <div class="loader__ring loader__ring--2"></div>
        </div>
      </div>

    </section>
  </main>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- Delete modal -->
  <div id="confirmModal" class="modal">
    <div class="modal__backdrop"></div>
    <div class="modal__card">
      <div class="modal__icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7h12z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h3>Delete this file?</h3>
      <p id="confirmModalText"></p>
      <div class="modal__actions">
        <button id="confirmCancel" class="btn-ghost-sm">Cancel</button>
        <button id="confirmOk" class="btn-danger">Delete permanently</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
